<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <title>DragonDex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">DRAGON BALL SUPER CARD GAME</p>
      <h1>DragonDex</h1>
    </div>
    <button id="resetBtn" class="ghost">איפוס סימונים</button>
  </header>

  <main>
    <section class="hero">
      <div>
        <span class="set-badge">BT31</span>
        <h2>Ultra Limit Collection</h2>
        <p>סמן אילו קלפים קיימים אצלך. הנתונים נשמרים אוטומטית במכשיר.</p>
      </div>
      <div class="progress-card">
        <div class="progress-value"><span id="ownedCount">0</span>/<span id="totalCount">151</span></div>
        <div class="bar"><div id="progressBar"></div></div>
        <div id="progressPercent">0%</div>
      </div>
    </section>

    <section class="controls">
      <input id="search" type="search" placeholder="חיפוש לפי מספר, שם, נדירות או צבע">
      <select id="rarityFilter">
        <option value="">כל הנדירויות</option>
        <option>C</option><option>UC</option><option>R</option><option>SR</option>
        <option>SPR</option><option>SCR</option><option>SLR</option><option>GDR</option>
      </select>
      <select id="statusFilter">
        <option value="">הכול</option>
        <option value="owned">יש לי</option>
        <option value="missing">חסר לי</option>
        <option value="wish">Wishlist</option>
      </select>
    </section>

    <section id="cards" class="cards"></section>
    <p id="emptyState" class="empty" hidden>לא נמצאו קלפים מתאימים.</p>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-head">
        <div>
          <strong class="card-number"></strong>
          <h3 class="card-name"></h3>
        </div>
        <span class="rarity"></span>
      </div>
      <div class="meta">
        <span class="card-color"></span>
        <span class="card-type"></span>
      </div>
      <p class="notes"></p>
      <div class="actions">
        <label class="check">
          <input class="owned" type="checkbox">
          <span>יש לי</span>
        </label>
        <button class="wish" type="button" aria-label="הוסף לרשימת משאלות">☆ Wishlist</button>
      </div>
    </article>
  </template>

  <script src="cards.js"></script>
  <script src="script.js"></script>
</body>
</html>
